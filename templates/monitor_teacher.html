{{define "monitor_teacher.html"}}
<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{appName}} — Live Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <script src="/static/js/app.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
</head>
<body class="min-h-screen flex flex-col font-sans relative overflow-hidden"
      style="background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);"
      x-data="teacherMonitor({{with .Data}}{{.Session.ID}}{{end}}, {{with .Data}}{{len .Questions}}{{end}})">

  <!-- Stars background -->
  <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="stars-layer"></div>
    <div class="absolute top-0 left-0 w-1/2 h-1/2 rounded-full opacity-20 blur-[100px]"
         style="background: radial-gradient(circle, #7c3aed, transparent 70%)"></div>
    <div class="absolute bottom-0 right-0 w-1/2 h-1/2 rounded-full opacity-15 blur-[100px]"
         style="background: radial-gradient(circle, #db2777, transparent 70%)"></div>
  </div>

  <!-- Header -->
  <div class="relative z-20 px-6 py-4 flex items-center justify-between border-b"
       style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-color: rgba(255,255,255,0.08);">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full border"
           style="background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25);">
        <span class="relative flex h-2.5 w-2.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
        </span>
        <span class="text-xs font-black tracking-widest uppercase text-red-400">Live</span>
      </div>
      <h1 class="font-black text-2xl text-white tracking-tight flex items-center gap-2">
        <span>📊</span> {{t .Lang "leaderboard"}}
      </h1>
    </div>

    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2 px-4 py-2 rounded-xl border"
           style="background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1);">
        <span class="text-xl">👥</span>
        <span class="text-sm font-bold uppercase tracking-wider" style="color: rgba(255,255,255,0.5);">{{t .Lang "players_joined"}}:</span>
        <strong x-text="playerCount" class="text-xl font-black ml-1" style="color: #a78bfa;"></strong>
      </div>
      <a :href="'/teacher/podium/'+sessionId"
         class="text-white text-sm font-bold py-2.5 px-6 rounded-xl transition-all duration-300 hover:-translate-y-0.5 flex items-center gap-2"
         style="background: linear-gradient(135deg, #7c3aed, #db2777); box-shadow: 0 4px 20px rgba(124,58,237,0.4);">
        🏆 {{t .Lang "final_results"}} →
      </a>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden relative z-10 p-4 gap-4">

    <!-- Race Track -->
    <div class="flex-1 rounded-3xl flex flex-col p-6 relative overflow-hidden border"
         style="background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border-color: rgba(255,255,255,0.07);">

      <div class="text-center mb-2 z-10">
        <span class="inline-block px-6 py-2 rounded-full font-black tracking-widest uppercase text-sm border"
              style="background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.25); color: #6ee7b7;">
          МАРРА СЫЗЫГЫ 🏁
        </span>
      </div>

      <div class="relative flex-1 min-h-[500px] mt-4" :style="'--total:' + totalQuestions">

        <!-- Finish label -->
        <div class="absolute top-0 w-full flex justify-center z-10 pt-1">
          <span class="text-xs font-black tracking-widest uppercase px-4 py-1 rounded-full"
                style="color: #6ee7b7; background: rgba(52,211,153,0.12);">🏁 Финиш</span>
        </div>

        <!-- Start label -->
        <div class="absolute bottom-0 w-full flex justify-center z-10 pb-1">
          <span class="text-xs font-black tracking-widest uppercase px-4 py-1 rounded-full border"
                style="color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);">
            ▶ Башталыш
          </span>
        </div>

        <!-- SVG track path -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0"
             viewBox="0 0 100 100" preserveAspectRatio="none"
             style="overflow: visible;">
          <defs>
            <filter id="trackGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="1.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Glow layer -->
          <path :d="trackPath" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="3.5"/>
          <!-- Dashed line -->
          <path :d="trackPath" fill="none" stroke="rgba(167,139,250,0.5)"
                stroke-width="1.2" stroke-dasharray="2.5 2" filter="url(#trackGlow)"/>
        </svg>

        <!-- Checkpoints -->
        <template x-for="i in totalQuestions" :key="'cp'+i">
          <div class="absolute flex items-center justify-center"
               style="width: 60px; height: 60px; margin-left: -30px; margin-bottom: -30px; z-index: 10;"
               :style="getCheckpointStyle(i)">
            <!-- Glow ring -->
            <div class="absolute inset-0 rounded-full opacity-40 animate-pulse"
                 :style="cpGlow(i)"></div>
            <!-- Circle -->
            <div class="relative w-14 h-14 rounded-full flex items-center justify-center font-black text-white border-2 shadow-xl"
                 :style="cpBg(i)">
              <span class="text-xl leading-none" x-text="i"></span>
            </div>
            <!-- Player count badge -->
            <div x-show="playersAt(i) > 0"
                 class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full flex items-center justify-center font-black text-white shadow-lg z-20"
                 style="font-size: 10px; background: #f472b6; box-shadow: 0 0 8px rgba(244,114,182,0.6);"
                 x-text="playersAt(i)"></div>
          </div>
        </template>

        <!-- Player Avatars -->
        <template x-for="p in playerList" :key="p.id">
          <div class="absolute transition-all duration-1000 ease-in-out flex flex-col items-center group cursor-pointer"
               :style="avatarStyle(p)">

            <!-- Name + score card -->
            <div class="mb-1.5 flex flex-col items-center transition-all scale-90 group-hover:scale-110" style="z-index: 100;">
              <div class="px-2 py-0.5 rounded-lg text-white text-xs font-black whitespace-nowrap border"
                   style="background: rgba(15,12,41,0.9); border-color: rgba(255,255,255,0.12); backdrop-filter: blur(8px);"
                   x-text="p.nickname"></div>
              <div class="mt-0.5 text-[10px] font-black px-1.5 py-0.5 rounded-md"
                   style="background: rgba(139,92,246,0.25); color: #c4b5fd;"
                   x-text="p.score + ' pts'"></div>
            </div>

            <!-- Avatar -->
            <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl relative shadow-xl transition-all duration-500"
                 :class="p.answered === totalQuestions ? 'animate-bounce' : ''"
                 :style="avatarRing(p)">
              <span x-text="p.avatar && !p.avatar.startsWith('/') ? p.avatar : '🐶'"></span>
            </div>

          </div>
        </template>

      </div>
    </div>

    <!-- Sidebar -->
    <div class="w-80 flex flex-col overflow-hidden rounded-3xl border"
         style="background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-color: rgba(255,255,255,0.08);">
      <div class="px-6 py-5 border-b" style="border-color: rgba(255,255,255,0.07);">
        <h3 class="text-lg font-black text-white flex items-center gap-2">🏆 Топ Оюнчулар</h3>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-2" id="leaderboard-list">
        <template x-for="(p, i) in sortedPlayers" :key="p.id">
          <div class="flex items-center gap-3 p-3 rounded-2xl transition-all duration-500 border"
               :style="rowStyle(i)">
            <div class="w-8 flex justify-center shrink-0">
              <span x-show="i===0" class="text-2xl">🥇</span>
              <span x-show="i===1" class="text-2xl">🥈</span>
              <span x-show="i===2" class="text-2xl">🥉</span>
              <span x-show="i>2" class="text-sm font-black" style="color: rgba(255,255,255,0.35);" x-text="i+1"></span>
            </div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-xl shrink-0 border"
                 style="background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12);">
              <span x-text="p.avatar && !p.avatar.startsWith('/') ? p.avatar : '🐶'"></span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-white truncate" :class="i<3 ? 'text-base' : 'text-sm'" x-text="p.nickname"></div>
              <div class="flex items-center gap-2 mt-0.5">
                <div class="text-xs font-black" style="color: #a78bfa;" x-text="p.score + ' pts'"></div>
                <div class="w-1 h-1 rounded-full" style="background: rgba(255,255,255,0.15)"></div>
                <div class="text-[10px] font-bold" style="color: rgba(255,255,255,0.35);">
                  <span x-text="p.answered"></span>/<span x-text="totalQuestions"></span> суроо
                </div>
              </div>
            </div>
          </div>
        </template>

        <div x-show="playerList.length===0" class="text-center mt-10">
          <div class="text-4xl mb-2 opacity-40">👀</div>
          <p class="text-sm font-bold" style="color: rgba(255,255,255,0.35);">Оюнчулар күтүлүүдө...</p>
        </div>
      </div>
    </div>

  </div>

<script>
function teacherMonitor(sessionId, totalQuestions) {
  const initPlayers = {{with .Data}}{{jsonPlayers .Players .Progress .Scores}}{{end}};

  const CP_COLORS = [
    { bg: 'linear-gradient(135deg,#6366f1,#8b5cf6)', glow: 'rgba(139,92,246,0.6)',  border: 'rgba(167,139,250,0.6)' },
    { bg: 'linear-gradient(135deg,#ec4899,#f472b6)', glow: 'rgba(244,114,182,0.6)', border: 'rgba(249,168,212,0.6)' },
    { bg: 'linear-gradient(135deg,#f59e0b,#fbbf24)', glow: 'rgba(251,191,36,0.6)',  border: 'rgba(252,211,77,0.6)'  },
    { bg: 'linear-gradient(135deg,#10b981,#34d399)', glow: 'rgba(52,211,153,0.6)',  border: 'rgba(110,231,183,0.6)' },
    { bg: 'linear-gradient(135deg,#3b82f6,#60a5fa)', glow: 'rgba(96,165,250,0.6)',  border: 'rgba(147,197,253,0.6)' },
    { bg: 'linear-gradient(135deg,#ef4444,#f87171)', glow: 'rgba(248,113,113,0.6)', border: 'rgba(252,165,165,0.6)' },
  ];

  function getPos(frac, curves) {
    const bottom = 8 + frac * 82; // 8% bottom padding, 82% range
    const x = 50 + Math.sin(frac * Math.PI * curves * 2) * 33;
    return { x, bottom };
  }

  return {
    sessionId,
    totalQuestions,
    playerList: initPlayers,
    ws: null,

    get playerCount() { return this.playerList.length; },
    get sortedPlayers() { return [...this.playerList].sort((a,b) => b.score - a.score); },

    get trackPath() {
      if (this.totalQuestions === 0) return '';
      const curves = this.totalQuestions > 10 ? 2.5 : 1.5;
      const pts = ['50 93']; // start near bottom
      for (let i = 1; i <= this.totalQuestions; i++) {
        const pos = getPos(i / this.totalQuestions, curves);
        pts.push(`${pos.x.toFixed(1)} ${(100 - pos.bottom).toFixed(1)}`);
      }
      return 'M ' + pts.join(' L ');
    },

    init() {
      this.ws = createWS(`/ws/teacher/${sessionId}`, (msg) => {
        if (msg.type === 'player_progress') {
          const p = this.playerList.find(x => x.id === msg.payload.player_id);
          if (p) { p.answered = msg.payload.questions_answered; p.score = msg.payload.total_score; }
        }
        if (msg.type === 'game_finished') {
          setTimeout(() => { location.href = `/teacher/podium/${sessionId}`; }, 3000);
        }
      });
    },

    getCheckpointStyle(step) {
      const curves = this.totalQuestions > 10 ? 2.5 : 1.5;
      const pos = getPos(step / this.totalQuestions, curves);
      return `bottom: ${pos.bottom}%; left: ${pos.x}%;`;
    },

    cpBg(step) {
      const c = CP_COLORS[(step - 1) % CP_COLORS.length];
      return `background: ${c.bg}; border-color: ${c.border}; box-shadow: 0 4px 20px ${c.glow};`;
    },

    cpGlow(step) {
      const c = CP_COLORS[(step - 1) % CP_COLORS.length];
      return `background: ${c.glow}; border-radius: 50%; transform: scale(1.5);`;
    },

    playersAt(step) {
      return this.playerList.filter(p => (p.answered || 0) === step).length;
    },

    avatarStyle(p) {
      const answered = p.answered || 0;
      const curves = this.totalQuestions > 10 ? 2.5 : 1.5;
      const frac = this.totalQuestions > 0 ? answered / this.totalQuestions : 0;
      const pos = getPos(frac, curves);

      // Cluster players at the same checkpoint in concentric rings
      const sameLevel = this.playerList.filter(x => (x.answered || 0) === answered);
      const idx = sameLevel.indexOf(p);
      const count = sameLevel.length;

      let offsetX = 0, offsetY = 0;
      if (count > 1) {
        const PER_RING = 8;
        const ring = Math.floor(idx / PER_RING);
        const idxInRing = idx % PER_RING;
        const countInRing = Math.min(PER_RING, count - ring * PER_RING);
        const angle = (idxInRing / countInRing) * Math.PI * 2 - Math.PI / 2;
        const rX = 5 + ring * 4.5; // ring radii: 5%, 9.5%, 14%...
        const rY = 3 + ring * 2.5;
        offsetX = Math.cos(angle) * rX;
        offsetY = Math.sin(angle) * rY;
      }

      const finalX = Math.max(7, Math.min(93, pos.x + offsetX));
      const finalBottom = Math.max(2, pos.bottom + offsetY);
      const z = Math.floor(frac * 100) * 2 + idx + 20;

      return `bottom: ${finalBottom}%; left: ${finalX}%; transform: translateX(-50%) translateY(50%); z-index: ${z};`;
    },

    avatarRing(p) {
      if (p.answered === this.totalQuestions) {
        return 'border: 3px solid #34d399; box-shadow: 0 0 20px rgba(52,211,153,0.7), 0 6px 16px rgba(0,0,0,0.4); background: rgba(52,211,153,0.12);';
      }
      if (p.score > 0) {
        return 'border: 3px solid #8b5cf6; box-shadow: 0 0 15px rgba(139,92,246,0.5), 0 6px 16px rgba(0,0,0,0.4); background: rgba(139,92,246,0.12);';
      }
      return 'border: 3px solid rgba(255,255,255,0.15); box-shadow: 0 6px 16px rgba(0,0,0,0.4); background: rgba(255,255,255,0.07);';
    },

    rowStyle(i) {
      if (i === 0) return 'background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.2);';
      if (i === 1) return 'background: rgba(203,213,225,0.08); border-color: rgba(203,213,225,0.15);';
      if (i === 2) return 'background: rgba(180,83,9,0.08); border-color: rgba(180,83,9,0.15);';
      return 'background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.04);';
    },
  };
}
</script>

<style>
  .stars-layer {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 85%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 45%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 30%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.6) 0%, transparent 100%);
    animation: starsTwinkle 6s ease-in-out infinite alternate;
  }

  @keyframes starsTwinkle {
    0%   { opacity: 0.5; }
    100% { opacity: 1; }
  }

  #leaderboard-list > div {
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), background-color 0.3s;
  }
</style>
</body>
</html>
{{end}}
