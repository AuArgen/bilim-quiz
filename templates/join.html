{{define "join.html"}}
<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{appName}} — {{t .Lang "join_game"}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']},colors:{primary:{DEFAULT:'#8B5CF6',hover:'#7C3AED'},accent:{DEFAULT:'#F472B6',hover:'#EC4899'},success:'#34D399',warning:'#FBBF24',info:'#60A5FA',cream:'#FDFBF7'}}}}</script>
</head>
<body class="bg-cream text-slate-800 min-h-screen flex flex-col items-center justify-center px-4 font-sans selection:bg-primary/20 relative overflow-hidden"
      x-data="joinPage()">

  <!-- Decorative Background Blobs -->
  <div class="absolute top-1/4 -left-20 w-72 h-72 bg-primary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
  <div class="absolute top-1/3 -right-20 w-72 h-72 bg-accent/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob" style="animation-delay: 2s"></div>
  <div class="absolute -bottom-32 left-1/2 -translate-x-1/2 w-96 h-96 bg-info/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob" style="animation-delay: 4s"></div>

  <div class="w-full max-w-md relative z-10">
    
    <!-- Header / Logo -->
    <div class="text-center mb-8 animate-fade-in-up">
      <div class="w-20 h-20 bg-white rounded-3xl mx-auto flex items-center justify-center text-5xl shadow-sm border border-slate-100 mb-4 transform hover:scale-110 transition-transform duration-300">🦉</div>
      <h1 class="text-4xl font-black text-slate-800 tracking-tight">{{appName}}</h1>
    </div>

    <!-- Main Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-lg shadow-slate-200/50 border border-white p-8 sm:p-10 animate-fade-in-up" style="animation-delay: 0.1s">
      <h2 class="text-lg font-bold mb-6 text-center text-slate-600">{{t .Lang "enter_pin"}}</h2>

      <form @submit.prevent="submit" class="space-y-6">
        <!-- PIN input -->
        <div class="relative">
          <input
            type="text"
            x-model="pin"
            @input="pin=pin.replace(/\D/g,'').slice(0,6)"
            class="w-full text-center text-5xl sm:text-6xl font-black tracking-[0.2em] sm:tracking-[0.3em] pl-[0.2em] sm:pl-[0.3em] py-5 sm:py-6 bg-slate-50 focus:bg-white border-2 border-slate-200 focus:border-primary rounded-2xl transition-all focus:ring-4 focus:ring-primary/20 placeholder:text-slate-200 text-slate-800"
            placeholder="000000"
            maxlength="6"
            autocomplete="off"
            autofocus
          />
          
          <!-- Error Message -->
          <div x-show="error" x-transition.opacity
               class="absolute -bottom-8 left-0 right-0 text-accent font-bold text-sm text-center flex items-center justify-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span x-text="error"></span>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                :disabled="pin.length !== 6 || loading"
                class="w-full bg-primary hover:bg-primary-hover disabled:bg-slate-300 disabled:shadow-none text-white text-xl font-black py-4 rounded-2xl shadow-lg shadow-primary/30 transition-all duration-300 flex items-center justify-center gap-2 group hover:-translate-y-1 disabled:transform-none mt-2">
          
          <svg x-show="loading" class="animate-spin -ml-1 mr-2 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          
          <span x-show="!loading">{{t .Lang "join"}}</span>
          <span x-show="!loading" class="text-2xl transition-transform group-hover:translate-x-1.5">→</span>
        </button>
      </form>
    </div>

    <!-- Lang switcher -->
    <div class="flex justify-center mt-10 animate-fade-in-up" style="animation-delay: 0.2s">
      <div class="bg-white/60 backdrop-blur-md p-1.5 rounded-xl flex gap-1 shadow-sm border border-slate-100">
        <a href="/lang/ky" class="px-4 py-1.5 rounded-lg text-sm transition-colors {{if eq .Lang "ky"}}bg-white text-primary font-bold shadow-sm{{else}}text-slate-500 hover:text-slate-800 font-medium{{end}}">KY</a>
        <a href="/lang/ru" class="px-4 py-1.5 rounded-lg text-sm transition-colors {{if eq .Lang "ru"}}bg-white text-primary font-bold shadow-sm{{else}}text-slate-500 hover:text-slate-800 font-medium{{end}}">RU</a>
        <a href="/lang/en" class="px-4 py-1.5 rounded-lg text-sm transition-colors {{if eq .Lang "en"}}bg-white text-primary font-bold shadow-sm{{else}}text-slate-500 hover:text-slate-800 font-medium{{end}}">EN</a>
      </div>
    </div>
    
  </div>

<script>
function joinPage() {
  // pre-fill from query string ?pin=
  const urlPin = new URLSearchParams(location.search).get('pin') || '';
  return {
    pin: urlPin,
    loading: false,
    error: '',
    async submit() {
      if (this.pin.length !== 6) return;
      this.loading = true;
      this.error = '';
      try {
        const res = await fetch('/join/check', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: 'pin=' + encodeURIComponent(this.pin),
        });
        if (res.ok) {
          location.href = '/lobby/' + this.pin;
        } else {
          const txt = await res.text();
          this.error = txt || '{{t .Lang "error_invalid_pin"}}';
        }
      } catch {
        this.error = '{{t .Lang "error_invalid_pin"}}';
      } finally {
        this.loading = false;
      }
    }
  };
}
</script>
<style>
  @keyframes blob {
    0% { transform: translate(0px, 0px) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  .animate-blob {
    animation: blob 7s infinite;
  }
</style>
</body>
</html>
{{end}}
