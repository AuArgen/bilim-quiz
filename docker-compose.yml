version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bilimquiz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bilimquiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bilimquiz_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/bilimquiz?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - ./player_images:/app/player_images

volumes:
  postgres_data:
